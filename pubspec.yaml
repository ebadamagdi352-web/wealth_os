  sqlite3_flutter_libs: ^0.5.39
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── Data layer (Task 019A) — code generation ─────────────────────────
  build_runner: ^2.5.4
  drift_dev: ^2.28.1

flutter:
