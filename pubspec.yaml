publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  riverpod: ^3.0.0
  flutter_riverpod: ^3.0.0
  go_router: ^16.0.0
  intl: ^0.20.0
  uuid: ^4.5.1
